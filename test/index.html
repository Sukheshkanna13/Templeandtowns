<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Temple And Towns Resorts — Stays in Pondicherry & Near Auroville</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/search.jsx"></script>
<script type="text/babel" src="components/booking.jsx"></script>
<script type="text/babel" src="components/account.jsx"></script>
<script type="text/babel" src="components/retreat.jsx"></script>
<script type="text/babel" src="components/events.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 202,
  "buttonShape": "pill"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('home');
  const [params, setParams] = useState({});
  const [searchCtx, setSearchCtx] = useState({ city: 'Pondicherry', checkIn: '2026-05-12', checkOut: '2026-05-15', guests: '2 guests · 1 room' });
  const [pendingBookCtx, setPendingBookCtx] = useState(null);
  const [activeBooking, setActiveBooking] = useState(null);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--accent', `oklch(0.58 0.16 ${tweaks.accentHue})`);
    root.style.setProperty('--accent-deep', `oklch(0.34 0.13 ${tweaks.accentHue})`);
    root.style.setProperty('--accent-soft', `oklch(0.96 0.04 ${tweaks.accentHue})`);
    root.style.setProperty('--pill', tweaks.buttonShape === 'pill' ? '980px' : '12px');
  }, [tweaks]);

  useEffect(() => {
    window.scrollTo(0, 0);
  }, [screen, params]);

  const go = (s, p = {}) => {
    setScreen(s); setParams(p);
  };

  const startBooking = ({ property, room }) => {
    setPendingBookCtx({ property, room, ...searchCtx });
    go('book');
  };

  const submitBookingRequest = (ctx) => {
    setActiveBooking(ctx);
    go('wa-sent');
  };

  return (
    <>
      <UtilityBar go={go}/>
      <Navbar screen={screen} go={go}/>
      <main>
        {screen === 'home'     && <HomeScreen go={go} setSearchCtx={setSearchCtx}/>}
        {screen === 'search'   && <SearchScreen go={go} searchCtx={searchCtx} setSearchCtx={setSearchCtx}/>}
        {screen === 'property' && <PropertyScreen go={go} params={params} searchCtx={searchCtx} startBooking={startBooking}/>}
        {screen === 'book'     && pendingBookCtx && <BookingWizard go={go} ctx={{...pendingBookCtx, ...searchCtx}} onSubmit={submitBookingRequest}/>}
        {screen === 'wa-sent'  && <WhatsAppSentScreen go={go} booking={activeBooking}/>}
        {screen === 'loyalty'  && <LoyaltyScreen go={go}/>}
        {screen === 'things'   && <ThingsScreen go={go}/>}
        {screen === 'retreat'  && <NatureRetreatScreen go={go}/>}
        {screen === 'events'   && <EventsPage go={go}/>}
        {screen === 'cause'    && <CauseScreen go={go}/>}
      </main>
      <Footer screen={screen}/>
      <WhatsAppFab/>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Color">
          <TweakSlider label="Accent hue" min={180} max={280} value={tweaks.accentHue} onChange={v => setTweak('accentHue', v)} />
        </TweakSection>
        <TweakSection title="Shape">
          <TweakRadio label="Buttons" value={tweaks.buttonShape} onChange={v => setTweak('buttonShape', v)}
            options={[{value:'pill', label:'Pill'},{value:'rounded', label:'Rounded'}]}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
